<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Restrito</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0a0205;color:#fff;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(180,10,35,.45) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(120,5,20,.35) 0%,transparent 55%),radial-gradient(ellipse 100% 80% at 50% 50%,rgba(30,0,8,.9) 0%,#0a0205 100%);z-index:0}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(200,16,46,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,16,46,.04) 1px,transparent 1px);background-size:60px 60px;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;animation:float 8s ease-in-out infinite;z-index:0}
.orb1{width:500px;height:500px;background:#C8102E;top:-150px;left:-100px}
.orb2{width:350px;height:350px;background:#8B0018;bottom:-100px;right:-50px;animation-delay:-4s}
.orb3{width:200px;height:200px;background:#E8102E;top:40%;right:20%;animation-delay:-2s;opacity:.12}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
#login-screen{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrapper{width:100%;max-width:460px}
.glass-card{background:rgba(255,255,255,.045);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-radius:28px;border:1px solid rgba(255,255,255,.10);padding:48px 44px 44px;box-shadow:0 0 0 1px rgba(200,16,46,.12),0 32px 80px rgba(0,0,0,.6),0 8px 24px rgba(200,16,46,.08),inset 0 1px 0 rgba(255,255,255,.08);opacity:0;animation:slideUp .7s cubic-bezier(.22,1,.36,1) .1s forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.lock-wrap{display:flex;justify-content:center;margin-bottom:28px}
.lock-ring{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,rgba(200,16,46,.25),rgba(200,16,46,.08));border:1px solid rgba(200,16,46,.3);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(200,16,46,.2),inset 0 1px 0 rgba(255,255,255,.1)}
.lock-ring svg{width:28px;height:28px}
.card-title{text-align:center;font-size:22px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2;margin-bottom:8px}
.card-subtitle{text-align:center;font-size:14px;color:rgba(255,255,255,.45);line-height:1.55;margin-bottom:36px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(200,16,46,.3),rgba(255,255,255,.08),rgba(200,16,46,.3),transparent);margin-bottom:32px}
.field-label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px}
.field-inner{position:relative}
.field-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:.35}
#pwd{width:100%;height:52px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:0 52px 0 48px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:#fff;letter-spacing:.04em;transition:all .2s;outline:none;-webkit-appearance:none}
#pwd::placeholder{color:rgba(255,255,255,.2);font-size:13px}
#pwd:focus{border-color:rgba(200,16,46,.5);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(200,16,46,.12)}
.toggle-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;opacity:.35;transition:opacity .2s;color:white}
.toggle-btn:hover{opacity:.7}
#submit-btn{width:100%;height:52px;background:linear-gradient(135deg,#C8102E 0%,#9e0c24 100%);border:none;border-radius:14px;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;margin-top:16px;transition:all .2s;box-shadow:0 4px 20px rgba(200,16,46,.35),0 1px 0 rgba(255,255,255,.12) inset;position:relative;overflow:hidden}

#submit-btn:hover{transform:translateY(-1px)}
#submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.footer-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.footer-text{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.06em;white-space:nowrap}

@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.08em}
</style>
</head>

<div class="orb orb3"></div>
