<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Tirzepatida</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;overflow-x:hidden}

#landing{
  min-height:100vh;
  background:#0a0205;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  position:relative;
  overflow:hidden;
}

.orb{position:absolute;border-radius:50%;filter:blur(88px);pointer-events:none;opacity:.25}
.orb1{width:560px;height:560px;background:#C8102E;top:-170px;left:-130px;animation:float 8s ease-in-out infinite}
.orb2{width:400px;height:400px;background:#8B0018;bottom:-110px;right:-70px;animation:float 8s ease-in-out infinite;animation-delay:-4s}
.orb3{width:240px;height:240px;background:#E8102E;top:42%;right:19%;animation:float 8s ease-in-out infinite;animation-delay:-2s;opacity:.12}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.04)}}

.grid-bg{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(200,16,46,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,16,46,.04) 1px,transparent 1px);
  background-size:60px 60px;
}

.gate-card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.045);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.10);
  padding:48px 44px 44px;
  width:100%;max-width:480px;
  box-shadow:0 0 0 1px rgba(200,16,46,.12),0 32px 80px rgba(0,0,0,.6),0 8px 24px rgba(200,16,46,.08),inset 0 1px 0 rgba(255,255,255,.08);
  animation:slideUp .7s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.gate-eyebrow{
  font-size:.68rem;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;
  color:rgba(200,16,46,.9);margin-bottom:10px;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.gate-title{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:1.55rem;font-weight:800;
  color:#fff;letter-spacing:-.02em;
  line-height:1.2;margin-bottom:8px;
}
.gate-sub{
  font-size:.84rem;color:rgba(255,255,255,.45);
  line-height:1.6;margin-bottom:32px;
}
.gate-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,16,46,.3),rgba(255,255,255,.07),rgba(200,16,46,.3),transparent);
  margin-bottom:28px;
}

.field-group{margin-bottom:16px}
.field-group label{
  display:block;font-size:.7rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.38);margin-bottom:7px;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.req{color:#C8102E;margin-left:2px}

.field-group input,.field-group select{
  width:100%;height:50px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.10);
  border-radius:13px;padding:0 14px;
  font-family:'DM Sans',sans-serif;
  font-size:.9rem;color:#fff;
  transition:border-color .18s,box-shadow .18s,background .18s;
  outline:none;-webkit-appearance:none;appearance:none;
}
.field-group input::placeholder{color:rgba(255,255,255,.22);font-size:.86rem}
.field-group select option{background:#1a0a0e;color:#fff}
.field-group input:focus,.field-group select:focus{
  border-color:rgba(200,16,46,.55);
  background:rgba(255,255,255,.09);
  box-shadow:0 0 0 3px rgba(200,16,46,.11);
}
.field-group input.error,.field-group select.error{border-color:rgba(239,68,68,.55)}
.field-err{font-size:.7rem;color:#f87171;margin-top:5px;display:none}

.select-wrap{position:relative}
.select-wrap::after{
  content:"▾";position:absolute;right:14px;top:50%;
  transform:translateY(-50%);
  color:rgba(255,255,255,.35);pointer-events:none;font-size:.78rem;
}

.check-wrap{
  display:flex;align-items:flex-start;gap:13px;
  margin:22px 0 26px;padding:15px 16px;
  background:rgba(255,255,255,.04);
  border-radius:13px;border:1.5px solid rgba(255,255,255,.08);
  cursor:pointer;transition:border-color .18s,background .18s;
}
.check-wrap:hover{border-color:rgba(200,16,46,.28);background:rgba(200,16,46,.04)}
.check-wrap input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:2px;accent-color:#C8102E;cursor:pointer}
.check-wrap span{font-size:.82rem;color:rgba(255,255,255,.58);line-height:1.6}

.btn-access{
  width:100%;height:52px;
  background:linear-gradient(135deg,#C8102E 0%,#9e0c24 100%);
  color:#fff;border:none;border-radius:13px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.9rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(200,16,46,.33),0 1px 0 rgba(255,255,255,.11) inset;
  position:relative;overflow:hidden;
}
.btn-access::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);border-radius:inherit}
.btn-access:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(200,16,46,.42)}
.btn-access:active:not(:disabled){transform:translateY(0)}
.btn-access:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.privacy-note{text-align:center;font-size:.7rem;color:rgba(255,255,255,.22);margin-top:14px;letter-spacing:.02em}

.security-badge{
  display:flex;align-items:center;justify-content:center;
  gap:6px;margin-top:20px;padding:7px 16px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:100px;width:fit-content;margin-left:auto;margin-right:auto;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6)}
.badge-text{font-size:.69rem;color:rgba(255,255,255,.24);letter-spacing:.08em}

/* iframe fullscreen — shown after access */
#tool-frame{
  display:none;position:fixed;inset:0;
  width:100%;height:100%;border:none;
}
</style>
</head>
<body>

<div id="landing">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-bg"></div>

  <div class="gate-card">
    <p class="gate-eyebrow">Acesso Profissional</p>
    <h1 class="gate-title">Validação de Acesso</h1>
    <p class="gate-sub">Ferramenta de uso exclusivo para profissionais de saúde habilitados.</p>

    <div class="gate-divider"></div>

    <div class="field-group">
      <label for="crm">Número de Registro Profissional (CRM/COREN)<span class="req">*</span></label>
      <input type="text" id="crm" placeholder="Ex: CRM 12345/SP" autocomplete="off"/>
      <p class="field-err" id="crm-err">Por favor, informe seu número de registro.</p>
    </div>

    <div class="field-group">
      <label for="espec">Especialidade<span class="req">*</span></label>
      <div class="select-wrap">
        <select id="espec">
          <option value="">Selecione uma especialidade</option>
          <option value="Clínica Médica">Clínica Médica</option>
<option value="Endocrinologia">Endocrinologia</option>
<option value="Cardiologia">Cardiologia</option>
<option value="Medicina de Família e Comunidade">Medicina de Família e Comunidade</option>
<option value="Nutrologia">Nutrologia</option>
<option value="Nutrição">Nutrição</option>
<option value="Geriatria">Geriatria</option>
<option value="Ginecologia e Obstetrícia">Ginecologia e Obstetrícia</option>
<option value="Medicina do Trabalho">Medicina do Trabalho</option>
<option value="Outra especialidade">Outra especialidade</option>
        </select>
      </div>
      <p class="field-err" id="espec-err">Por favor, selecione sua especialidade.</p>
    </div>

    <label class="check-wrap" for="confirm">
      <input type="checkbox" id="confirm"/>
      <span>Confirmo que sou um profissional de saúde qualificado e que utilizarei esta ferramenta exclusivamente para suporte à decisão clínica.</span>
    </label>

    <button class="btn-access" id="btn-access" onclick="handleAccess()" disabled>
      Acessar Ferramenta
    </button>
    <p class="privacy-note">Seus dados serão tratados conforme nossa política de privacidade.</p>
    <div class="security-badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Conexão segura · SSL</span>
    </div>
  </div>
</div>

<!-- iframe recebe o HTML completo da calculadora via srcdoc -->
<iframe id="tool-frame" srcdoc="<!DOCTYPE html>
<html lang=&quot;pt-BR&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>Calculadora de Perda de Peso — Tirzepatida</title>
<link href=&quot;https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=DM+Sans:wght@300;400;500&amp;display=swap&quot; rel=&quot;stylesheet&quot;>
<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js&quot;></script>
<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js&quot;></script>
<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js&quot;></script>
<style>
:root {
  --red:        #C8102E;
  --red-dk:     #9e0c24;
  --red-lt:     #f7e6e9;
  --purple-dk:  #4f46e5;
  --grad-start: #C8102E;
  --grad-end:   #7a0619;
  --ink:    #1a1a2e;
  --mid:    #4a4a6a;
  --muted:  #9ca3af;
  --surface: #ffffff;
  --bg:     #f6f7fb;
  --border: #e2e4ef;
  --shadow:  0 2px 20px rgba(200,16,46,.08);
  --radius:    16px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
.hero {
  background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
  padding: 32px 48px 28px;
  color: #fff;
}
@media(max-width:600px){ .hero{ padding:20px 20px 18px; } }
.hero-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(1.45rem, 2.6vw, 2.05rem);
  font-weight: 800;
  letter-spacing: -.02em;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
  line-height: 1.1;
}
.hero-sub {
  font-size: .9rem;
  font-weight: 400;
  color: rgba(255,255,255,.78);
  line-height: 1.5;
  margin-left: 2px;
}
.main { max-width: 1160px; margin: 0 auto; padding: 24px 20px 56px; }
.grid-2 {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 20px;
  align-items: start;
}
@media(max-width:1000px){ .grid-2{ grid-template-columns: 300px 1fr; } }
@media(max-width:800px){  .grid-2{ grid-template-columns: 1fr; } }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: visible;
  margin-bottom: 18px;
}
.card:last-child { margin-bottom: 0; }
.card-head {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .88rem;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border-radius: var(--radius) var(--radius) 0 0;
  overflow: hidden;
}
.card-head-left { display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }
.form-group { margin-bottom: 13px; }
label {
  display: block;
  font-size: .72rem;
  font-weight: 600;
  color: var(--mid);
  margin-bottom: 4px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
input[type=number],
input[type=date],
select {
  width: 100%;
  height: 40px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 11px;
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  color: var(--ink);
  background: #fff;
  transition: border-color .18s, box-shadow .18s;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(200,16,46,.1);
}
.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: .75rem;
}
.form-hint { font-size: .68rem; color: var(--muted); margin-top: 3px; line-height: 1.45; }
.form-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-section-title {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--red);
  margin: 16px 0 10px;
  padding-bottom: 5px;
  border-bottom: 1.5px solid var(--red-lt);
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-calc {
  width: 100%;
  height: 44px;
  background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: opacity .18s, transform .1s;
  box-shadow: 0 4px 14px rgba(200,16,46,.28);
  margin-top: 4px;
}
.btn-calc:hover  { opacity: .9; }
.btn-calc:active { transform: scale(.98); }
.btn-reset {
  height: 44px;
  width: 44px;
  flex-shrink: 0;
  background: #fff;
  color: var(--mid);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .18s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); background: #fff5f6; }
.btn-pdf {
  height: 34px;
  padding: 0 14px;
  background: #fff;
  color: var(--red);
  border: 1.5px solid var(--red);
  border-radius: var(--radius-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .75rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: .18s;
  
  flex-shrink: 0;
}
.btn-pdf:hover { background: var(--red); color: #fff; }
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 240px;
  color: var(--muted);
  text-align: center;
  gap: 12px;
}
.empty-state svg { opacity: .2; width: 48px; height: 48px; }
.empty-state p   { font-size: .84rem; max-width: 210px; line-height: 1.55; }
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
@media(max-width:620px){ .summary-row { grid-template-columns: 1fr 1fr !important; } }
.stat-card {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 12px 13px 11px;
  border: 1px solid var(--border);
  min-width: 0;
}
.stat-card.accent {
  background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
  border-color: transparent;
}
.stat-label {
  font-size: .60rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  margin-bottom: 3px;
  
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-card.accent .stat-label { color: rgba(255,255,255,.75); }
.stat-value {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(1.2rem, 1.8vw, 1.5rem);
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
  
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-card.accent .stat-value { color: #fff; }
.stat-sub {
  font-size: .63rem;
  color: var(--muted);
  margin-top: 3px;
  
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-card.accent .stat-sub { color: rgba(255,255,255,.68); }
.patient-tag-strip {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.ptag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 20px;
  padding: 4px 11px;
  font-size: .70rem;
  font-weight: 600;
  
  line-height: 1.3;
}
.ptag.date  { background: #f0f4ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
.ptag.days  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.ptag.below { background: #fff1f2; border: 1px solid #fecdd3; color: #C8102E; }
.ptag.on    { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
.ptag.above { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
.chart-tabs-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  min-height: 36px;
}
.chart-tabs { display: flex; gap: 6px; flex-shrink: 0; }
.atag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 20px;
  padding: 4px 11px;
  font-size: .70rem;
  font-weight: 700;
  
}
.atag.twl-tag { background: #ede9fe; border: 1.5px solid #7c3aed; color: #5b21b6; }
.atag.wt-tag  { background: #e0f2fe; border: 1.5px solid #0284c7; color: #0369a1; }
.chart-tab {
  font-family: 'DM Sans', sans-serif;
  font-size: .74rem;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--mid);
  cursor: pointer;
  transition: .18s;
  
}
.chart-tab.active {
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  color: #fff;
  border-color: transparent;
}
.chart-wrap {
  position: relative;
  height: 340px;
  margin-bottom: 4px;
}
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: .84rem; }
thead tr { background: #9e0c24; }
th {
  text-align: left;
  padding: 10px 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .74rem;
  font-weight: 700;
  color: #fff;
  
}
td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: #fafbff; }
tr:hover td { background: #f0f0f8; }
td:first-child { font-weight: 700; color: var(--ink); }
.td-loss { font-weight: 600; color: #4f46e5; }
.td-iqr  { color: #b0b3c6; font-size: .82rem; }
tr.actual-row td { background: #fff8f0 !important; }
.disclaimer {
  background: #fffbeb;
  border: 1.5px solid #fbbf24;
  border-radius: var(--radius-sm);
  padding: 12px 15px;
  font-size: .73rem;
  color: #78350f;
  line-height: 1.55;
  margin-top: 4px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.fade-in { animation: fadeIn .32s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
#pdfArea { background: #fff; }
footer {
  text-align: center;
  padding: 16px;
  font-size: .68rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  background: var(--surface);
  line-height: 1.6;
}
@media print {
  .btn-pdf, .btn-calc, .chart-tabs, footer, .hero { display: none !important; }
  .main  { padding: 0 !important; }
  .grid-2 { grid-template-columns: 1fr !important; }
}
.form-scope-notice {
  background: #fef3c7;
  border: 1px solid #f59e0b;
  border-radius: 8px;
  padding: 8px 11px;
  color: #78350f;
  font-size: .70rem;
  line-height: 1.5;
  margin-bottom: 10px;
}
.btn-row {
  display: grid;
  grid-template-columns: 1fr 44px;
  gap: 8px;

<script>
const TWL_FINAL = {
  N:   { 5: 16.0, 10: 20.8, 15: 22.2 },
  PRE: { 5: 15.1, 10: 20.0, 15: 21.1 },
  DM2: { 5: 10.3, 10: 13.4, 15: 15.7 }
};
const IQR_W72 = {
  N:   { 5:{q1:8.0,q3:21.7}, 10:{q1:11.4,q3:26.2}, 15:{q1:13.3,q3:27.3} },
  PRE: { 5:{q1:7.5,q3:20.5}, 10:{q1:10.8,q3:25.0}, 15:{q1:12.5,q3:26.0} },
  DM2: { 5:{q1:5.0,q3:17.0}, 10:{q1:6.5,q3:19.5}, 15:{q1:8.0,q3:21.0} }
};
const LOGISTIC_PARAMS = {
  N:   { mid: 25, rate: 0.08 },
  PRE: { mid: 25, rate: 0.08 },
  DM2: { mid: 28, rate: 0.07 }
};
const SEX_FACTOR = { Female: 1.08, Male: 0.93 };
const WEEKS       = [0, 4, 8, 12, 20, 24, 36, 48, 60, 72];
const TABLE_WEEKS = [0, 4, 8, 12, 24, 36, 52, 72];
let chartInstance = null;
let lastState     = null;
let chartMode     = 'weight';

function logistic(week, pop) {
  const p = LOGISTIC_PARAMS[pop] || LOGISTIC_PARAMS.N;
  return 1 / (1 + Math.exp(-p.rate * (week - p.mid)));
}
function logisticW72(pop) { return logistic(72, pop); }

function calcTWLFinal(dose, age, bmi, sex, pop) {
  const base = TWL_FINAL[pop] &amp;&amp; TWL_FINAL[pop][dose];
  if (base === null || base === undefined) return null;
  let twl = base;
  if (pop !== 'DM2') {
    twl *= SEX_FACTOR[sex] || 1.0;
    if (age > 51) twl *= 0.95;
  } else {
    twl *= (SEX_FACTOR[sex] || 1.0) * 0.5 + 0.5;
    if (age > 60) twl *= 0.97;
  }
  const bmiRef = pop === 'DM2' ? 36.1 : 37.5;
  twl = twl * (1 + (bmi - bmiRef) * 0.004);
  const cap   = pop === 'DM2' ? 22 : 30;
  const floor = pop === 'DM2' ? 5  : 8;
  return Math.max(floor, Math.min(twl, cap));
}

function daysToWeeks(days) { return days / 7; }
function fmtDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function updateGlycemicHint() {
  const g = document.getElementById('glycemic').value;
  const hints = {
    N:   'SURMOUNT-1 · Jastreboff et al., NEJM 2022 · n=2.539',
    PRE: 'SURMOUNT-1 subgrupo pré-diabetes · Jastreboff et al., NEJM 2024 · n=1.032',
    DM2: 'SURMOUNT-2 · Garvey et al., Lancet 2023 · n=938'
  };
  const el = document.getElementById('glycemicHint');
  if (el) el.textContent = hints[g] || 'Selecione o status glicêmico basal do paciente';
  const doseHint = document.getElementById('doseHint');
  if (doseHint) {
    doseHint.textContent = g === 'DM2' ? '⚠️ Para DM2: 10mg e 15mg têm dados do SURMOUNT-2. 5mg = estimativa extrapolada' : '';
    doseHint.style.color = (g === 'DM2') ? '#b45309' : '';
  }
}

function calcPercentile(actualTWL, medianTWL, q1, q3) {
  const iqr   = q3 - q1;
  const sigma = iqr / 1.35;
  if (sigma <= 0) return 50;
  const z   = (actualTWL - medianTWL) / sigma;
  const t   = 1 / (1 + 0.2316419 * Math.abs(z));
  const poly = t*(0.319381530 + t*(-0.356563782 + t*(1.781477937 + t*(-1.821255978 + t*1.330274429))));
  const phi  = 1 - (1/Math.sqrt(2*Math.PI)) * Math.exp(-0.5*z*z) * poly;
  return Math.round(z >= 0 ? phi*100 : (1-phi)*100);
}

function resetForm() {
  ['weight','height','age','weightCurrent'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  ['sex','dose','glycemic'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  ['dateStart','dateCurrent'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  updateGlycemicHint();
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('disclaimer').style.display = 'none';
  document.getElementById('btnPdf').style.display = 'none';
  const at = document.getElementById('actualTags');
  if (at) at.style.display = 'none';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  lastState = null;
}

function calculate() {
  const weight        = parseFloat(document.getElementById('weight').value);
  const height        = parseFloat(document.getElementById('height').value);
  const age           = parseFloat(document.getElementById('age').value);
  const sex           = document.getElementById('sex').value;
  const dose          = parseInt(document.getElementById('dose').value);
  const glycemic      = document.getElementById('glycemic').value;
  const dateStart     = document.getElementById('dateStart').value;
  const dateCurrent   = document.getElementById('dateCurrent').value;
  const weightCurrent = parseFloat(document.getElementById('weightCurrent').value);

  const miss = [];
  if (!weight||weight<40||weight>300)  miss.push('Peso inicial (40–300 kg)');
  if (!height||height<120||height>250) miss.push('Altura (120–250 cm)');
  if (!age||age<18||age>80)            miss.push('Idade (18–80 anos)');
  if (!sex)       miss.push('Sexo biológico');
  if (!dose)      miss.push('Dose');
  if (!glycemic)  miss.push('Status glicêmico');
  if (!dateStart) miss.push('Data da 1ª consulta');
  if (miss.length) { alert('Por favor, preencha corretamente:\n• ' + miss.join('\n• ')); return; }

  const bmi      = weight / ((height / 100) ** 2);
  const pop      = glycemic;
  const twlFinal = calcTWLFinal(dose, age, bmi, sex, pop);
  const { q1: q1_72, q3: q3_72 } = IQR_W72[pop][dose];
  const logi72 = logisticW72(pop);

  const predictions = WEEKS.map(wk => {
    const logi  = wk === 0 ? 0 : logistic(wk, pop);
    const scale = logi / logi72;
    const twlWk = twlFinal * scale;
    const q1Wk  = q1_72   * scale;
    const q3Wk  = q3_72   * scale;
    return {
      week: wk,
      weight:      weight * (1 - twlWk / 100),
      weightLower: weight * (1 - q3Wk  / 100),
      weightUpper: weight * (1 - q1Wk  / 100),
      bmi:         weight * (1 - twlWk / 100) / ((height / 100) ** 2),
      twl: twlWk, twlQ1: q1Wk, twlQ3: q3Wk
    };
  });

  let currentPoint = null;
  if (dateCurrent &amp;&amp; dateStart) {
    const d1       = new Date(dateStart);
    const d2       = new Date(dateCurrent);
    const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    if (diffDays > 0) {
      const weeksElapsed = daysToWeeks(diffDays);
      const logiC       = logistic(weeksElapsed, pop);
      const scaleC      = logiC / logi72;
      const twlExpected = twlFinal * scaleC;
      const q1Expected  = q1_72   * scaleC;
      const q3Expected  = q3_72   * scaleC;
      const wExpected   = weight * (1 - twlExpected / 100);
      const wLower      = weight * (1 - q3Expected  / 100);
      const wUpper      = weight * (1 - q1Expected  / 100);

      currentPoint = { weeksElapsed, diffDays, wExpected, wLower, wUpper,
                       twlExpected, q1Expected, q3Expected };

      if (!isNaN(weightCurrent) &amp;&amp; weightCurrent > 0) {
        const actualTWL      = (weight - weightCurrent) / weight * 100;
        const pct            = calcPercentile(actualTWL, twlExpected, q1Expected, q3Expected);
        const diffFromMedian = actualTWL - twlExpected;
        const diffFromTarget = twlFinal  - actualTWL;
        currentPoint.actualWeight    = weightCurrent;
        currentPoint.actualTWL       = actualTWL;
        currentPoint.percentile      = pct;
        currentPoint.diffFromMedian  = diffFromMedian;
        currentPoint.diffFromTarget  = diffFromTarget;
      }
    }
  }

  lastState = { predictions, weight, height, bmi, dose, glycemic, pop,
                dateStart, dateCurrent, weightCurrent, currentPoint, twlFinal };
  renderResults(lastState);
}

function renderResults(s) {
  const { predictions, weight, bmi, currentPoint, pop } = s;
  const final  = predictions[predictions.length - 1];
  const lostKg = (weight - final.weight).toFixed(1);

  const POP_LABEL  = { N:'Sem diabetes', PRE:'Pré-diabetes', DM2:'Diabetes tipo 2' };
  const POP_SOURCE = { N:'SURMOUNT-1 · NEJM 2022', PRE:'SURMOUNT-1 pré-DM · NEJM 2024', DM2:'SURMOUNT-2 · Lancet 2023' };
  const POP_COLOR  = { N:'#1d4ed8', PRE:'#d97706', DM2:'#9333ea' };

  document.getElementById('emptyState').style.display = 'none';
  const rc = document.getElementById('resultContent');
  rc.style.display = 'block'; rc.classList.add('fade-in');
  document.getElementById('tableCard').style.display = 'block';
  document.getElementById('disclaimer').style.display = 'flex';
  document.getElementById('btnPdf').style.display = 'flex';

  let tagsHtml = '';
  if (currentPoint) {
    const wks = currentPoint.weeksElapsed.toFixed(1);
    const days = currentPoint.diffDays;
    tagsHtml += `<div class=&quot;ptag days&quot;>⏱ ${days} dias · ${wks} semanas de tratamento</div>`;
  }
  const bc = POP_COLOR[pop] || '#1d4ed8';
  tagsHtml += `<div class=&quot;ptag&quot; style=&quot;background:${bc}18;border:1px solid ${bc}55;color:${bc}&quot;>🔬 ${POP_LABEL[pop] || pop}</div>`;
  if (currentPoint &amp;&amp; currentPoint.actualTWL !== undefined) {
    const diff = currentPoint.diffFromMedian;
    if (diff >= 1.5) tagsHtml += `<div class=&quot;ptag above&quot;>🟢 Acima da média do estudo (+${diff.toFixed(1)}%)</div>`;
    else if (diff <= -1.5) tagsHtml += `<div class=&quot;ptag below&quot;>🔴 Abaixo da média do estudo (${diff.toFixed(1)}%)</div>`;
    else tagsHtml += `<div class=&quot;ptag on&quot;>🔵 Na média do estudo (${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%)</div>`;
  }
  document.getElementById('patientTags').innerHTML = tagsHtml;

  const srcLabel = POP_SOURCE[pop] || '';
  document.getElementById('summaryCards').innerHTML = `
    <div class=&quot;stat-card accent&quot;>
      <div class=&quot;stat-label&quot;>Perda estimada · Sem. 72</div>
      <div class=&quot;stat-value&quot;>−${final.twl.toFixed(1)}%</div>
      <div class=&quot;stat-sub&quot;>−${lostKg} kg · ${srcLabel}</div>
    </div>
    <div class=&quot;stat-card&quot;>
      <div class=&quot;stat-label&quot;>Peso previsto · Sem. 72</div>
      <div class=&quot;stat-value&quot;>${final.weight.toFixed(1)}</div>
      <div class=&quot;stat-sub&quot;>kg · média</div>
    </div>
    <div class=&quot;stat-card&quot;>
      <div class=&quot;stat-label&quot;>IMC inicial</div>
      <div class=&quot;stat-value&quot;>${bmi.toFixed(1)}</div>
      <div class=&quot;stat-sub&quot;>kg/m² · basal</div>
    </div>
    <div class=&quot;stat-card&quot;>
      <div class=&quot;stat-label&quot;>IMC previsto · Sem. 72</div>
      <div class=&quot;stat-value&quot;>${final.bmi.toFixed(1)}</div>
      <div class=&quot;stat-sub&quot;>kg/m² · média</div>
    </div>`;

  const actualTagsEl = document.getElementById('actualTags');
  if (currentPoint &amp;&amp; currentPoint.actualTWL !== undefined &amp;&amp; actualTagsEl) {
    const diff = currentPoint.diffFromMedian;
    const diffStr = diff >= 0 ? `+${diff.toFixed(1)}%` : `${diff.toFixed(1)}%`;
    const actLostKg = (weight - currentPoint.actualWeight).toFixed(1);
    actualTagsEl.innerHTML = `
      <div class=&quot;atag twl-tag&quot;>📉 −${currentPoint.actualTWL.toFixed(1)}% perda atual <span style=&quot;opacity:.7;font-weight:500&quot;>(${diffStr} vs média)</span></div>
      <div class=&quot;atag wt-tag&quot;>⚖️ ${currentPoint.actualWeight.toFixed(1)} kg <span style=&quot;opacity:.7;font-weight:500&quot;>(−${actLostKg} kg)</span></div>`;
    actualTagsEl.style.display = 'flex';
  } else if (actualTagsEl) {
    actualTagsEl.style.display = 'none';
  }

  const rows = predictions.filter(p => TABLE_WEEKS.includes(p.week));
  let tableRows = [];
  let insertedActual = false;
  for (let i = 0; i < rows.length; i++) {
    const p = rows[i];
    const nextP = rows[i + 1];
    const weekLabel = p.week === 0 ? 'Baseline' : `Semana ${p.week}`;
    tableRows.push(`<tr>
      <td>${weekLabel}</td>
      <td>${p.weight.toFixed(1)}</td>
      <td>${p.bmi.toFixed(1)}</td>
      <td class=&quot;td-loss&quot;>${p.twl.toFixed(1)}%</td>
      <td class=&quot;td-iqr&quot;>${p.weightLower.toFixed(1)} – ${p.weightUpper.toFixed(1)}</td>
    </tr>`);
    if (!insertedActual &amp;&amp; currentPoint &amp;&amp; currentPoint.actualWeight !== undefined) {
      const wks = currentPoint.weeksElapsed;
      const isExact = TABLE_WEEKS.some(w => Math.abs(w - wks) < 1);
      if (!isExact) {
        const afterCurrent = nextP &amp;&amp; wks > p.week &amp;&amp; wks < nextP.week;
        const atEnd = !nextP &amp;&amp; wks > p.week;
        if (afterCurrent || atEnd) {
          const actualIMC = currentPoint.actualWeight / ((s.height / 100) ** 2);
          const diff = currentPoint.diffFromMedian;
          const perfColor  = diff >= 1.5 ? '#15803d' : diff <= -1.5 ? '#C8102E' : '#1d4ed8';
          const perfBg     = diff >= 1.5 ? '#f0fdf4' : diff <= -1.5 ? '#fff1f2' : '#eff6ff';
          const perfBorder = diff >= 1.5 ? '#86efac' : diff <= -1.5 ? '#fecdd3' : '#bfdbfe';
          const diffStr    = `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%`;
          const tag = (txt) => `<span style=&quot;display:inline-block;background:${perfBg};border:1px solid ${perfBorder};color:${perfColor};font-size:.75rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:4px;&quot;>${txt}</span>`;
          tableRows.push(`<tr class=&quot;actual-row&quot;>
            <td>${tag('Semana ' + wks.toFixed(1))}<br>${tag('Consulta atual')}</td>
            <td>${currentPoint.wExpected.toFixed(1)}<br>${tag(currentPoint.actualWeight.toFixed(1) + ' kg')}</td>
            <td>${(currentPoint.wExpected / ((s.height/100)**2)).toFixed(1)}<br>${tag(actualIMC.toFixed(1))}</td>
            <td class=&quot;td-loss&quot;>${currentPoint.twlExpected.toFixed(1)}%<br>${tag('−'+currentPoint.actualTWL.toFixed(1)+'% ('+diffStr+' vs média)')}</td>
            <td class=&quot;td-iqr&quot;>${currentPoint.wLower.toFixed(1)} – ${currentPoint.wUpper.toFixed(1)}</td>
          </tr>`);
          insertedActual = true;
        }
      }
    }
  }
  document.getElementById('predTbody').innerHTML = tableRows.join('');

  chartMode = 'weight';
  document.querySelectorAll('.chart-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderChart(predictions, 'weight', currentPoint);
}

function renderChart(predictions, mode, currentPoint) {
  const labels = predictions.map(p => p.week===0?'Baseline':`S${p.week}`);
  let median, lower, upper, yLabel, suffix, lineCol, bandCol, dashCol;

  if (mode === 'weight') {
    median = predictions.map(p => +p.weight.toFixed(2));
    upper  = predictions.map(p => +p.weightUpper.toFixed(2));
    lower  = predictions.map(p => +p.weightLower.toFixed(2));
    yLabel='Peso (kg)'; suffix=' kg';
    lineCol='#C8102E'; bandCol='rgba(200,16,46,0.09)'; dashCol='#ff6b8a';
  } else {
    median = predictions.map(p => +(-p.twl).toFixed(2));
    lower  = predictions.map(p => +(-p.twlQ3).toFixed(2));
    upper  = predictions.map(p => +(-p.twlQ1).toFixed(2));
    yLabel='Perda de Peso (%)'; suffix='%';
    lineCol='#6d28d9'; bandCol='rgba(236,72,153,0.13)'; dashCol='#ec4899';
  }

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');

  const verticalLinePlugin = {
    id: 'verticalMarker',
    afterDraw(chart) {
      if (!currentPoint) return;
      const wks = currentPoint.weeksElapsed;
      const WEEKS_ALL = [0,4,8,12,20,24,36,48,60,72];
      let idxLeft = 0;
      for (let i = 0; i < WEEKS_ALL.length - 1; i++) {
        if (WEEKS_ALL[i] <= wks &amp;&amp; wks <= WEEKS_ALL[i+1]) { idxLeft = i; break; }
      }
      const idxRight = Math.min(idxLeft + 1, WEEKS_ALL.length - 1);
      const wL = WEEKS_ALL[idxLeft], wR = WEEKS_ALL[idxRight];
      const frac = wR > wL ? (wks - wL) / (wR - wL) : 0;
      const xScale = chart.scales['x'];
      const yScale = chart.scales['y'];
      if (!xScale || !yScale) return;
      const xPixelLeft  = xScale.getPixelForValue(idxLeft);
      const xPixelRight = xScale.getPixelForValue(idxRight);
      const xPixel = xPixelLeft + (xPixelRight - xPixelLeft) * frac;
      const hasActual = currentPoint.actualWeight !== undefined;
      const yVal = mode === 'weight'
        ? (hasActual ? currentPoint.actualWeight : currentPoint.wExpected)
        : (hasActual ? -currentPoint.actualTWL    : -currentPoint.twlExpected);
      const yPixel = yScale.getPixelForValue(yVal);
      const yBottom = yScale.bottom;
      const yAxisX  = yScale.left;
      const c = chart.ctx;
      const AMBER = '#f59e0b';
      c.save();
      c.beginPath();
      c.setLineDash([4, 4]);
      c.strokeStyle = AMBER;
      c.lineWidth = 1.5;
      c.moveTo(xPixel, yPixel + 8);
      c.lineTo(xPixel, yBottom);
      c.stroke();
      c.restore();
      c.save();
      c.beginPath();
      c.setLineDash([3, 3]);
      c.strokeStyle = AMBER;
      c.lineWidth = 1;
      c.moveTo(yAxisX, yPixel);
      c.lineTo(xPixel - 8, yPixel);
      c.stroke();
      c.restore();
    }
  };

  const extraDs = [];
  if (currentPoint) {
    const wks = currentPoint.weeksElapsed;
    const WEEKS_ALL = [0,4,8,12,20,24,36,48,60,72];
    let idxLeft = 0, idxRight = WEEKS_ALL.length - 1;
    for (let i = 0; i < WEEKS_ALL.length - 1; i++) {
      if (WEEKS_ALL[i] <= wks &amp;&amp; wks <= WEEKS_ALL[i+1]) { idxLeft = i; idxRight = i + 1; break; }
    }
    const wL = WEEKS_ALL[idxLeft], wR = WEEKS_ALL[idxRight];
    const frac = wR > wL ? (wks - wL) / (wR - wL) : 0;
    const xPos = idxLeft + frac;
    const hasActual = currentPoint.actualWeight !== undefined;
    const yVal = mode === 'weight'
      ? (hasActual ? currentPoint.actualWeight : currentPoint.wExpected)
      : (hasActual ? -currentPoint.actualTWL    : -currentPoint.twlExpected);
    extraDs.push({
      label: 'Peso atual',
      data: [{ x: xPos, y: +yVal.toFixed(2) }],
      type: 'scatter',
      fill: false,
      borderColor: 'transparent',
      backgroundColor: '#f59e0b',
      pointBackgroundColor: '#f59e0b',
      pointBorderColor: '#fff',
      pointBorderWidth: 2.5,
      pointRadius: 6,
      pointHoverRadius: 9,
      pointStyle: 'circle',
      order: 0,
      xAxisID: 'xFrac'
    });
  }

  chartInstance = new Chart(ctx, {
    plugins: [verticalLinePlugin],
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'IIQ superior (P75)', data: upper, fill: '+1', borderColor: dashCol, backgroundColor: bandCol, borderWidth: 1.6, borderDash: [6,4], pointRadius: 0, pointHoverRadius: 4, tension: .4, order: 3 },
        { label: 'IIQ inferior (P25)', data: lower, fill: false, borderColor: dashCol, borderWidth: 1.6, borderDash: [6,4], pointRadius: 0, pointHoverRadius: 4, tension: .4, order: 3 },
        { label: mode==='weight'?'Peso previsto (kg)':'Perda de Peso (%)', data: median, fill: false, borderColor: lineCol, backgroundColor: lineCol, borderWidth: 2.5, pointRadius: 5, pointHoverRadius: 8, pointBackgroundColor: lineCol, pointBorderColor: '#fff', pointBorderWidth: 2, tension: .4, order: 1 },
        ...extraDs
      ]
    },
    options: {
      clip: false,
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'nearest', intersect:false, axis:'x' },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            usePointStyle: true, pointStyle: 'line',
            font: { family:&quot;'DM Sans',sans-serif&quot;, size:12 },
            color: '#111827', padding: 18,
            generateLabels: chart => {
              const ds = chart.data.datasets;
              const out = [];
              out.push({ text: ds[2].label, strokeStyle:lineCol, fillStyle:lineCol, lineWidth:2.5, pointStyle:'line', hidden:false, datasetIndex:2, fontColor:'#111827' });
              out.push({ text:'Banda IIQ (P25–P75)', strokeStyle:dashCol, fillStyle:bandCol, lineWidth:1.6, lineDash:[6,4], pointStyle:'line', hidden:false, datasetIndex:0, fontColor:'#111827' });
              if (currentPoint) out.push({ text: 'Consulta atual', strokeStyle:'#f59e0b', fillStyle:'#f59e0b', lineWidth:0, pointStyle:'circle', hidden:false, datasetIndex:3, fontColor:'#111827' });
              return out;
            }
          }
        },
        tooltip: {
          backgroundColor: '#1a1a2e',
          titleFont: { family:&quot;'Plus Jakarta Sans',sans-serif&quot;, size:13, weight:'700' },
          bodyFont:  { family:&quot;'DM Sans',sans-serif&quot;, size:12 },
          padding: 14
        }
      },
      scales: {
        x: {
          grid:{color:'rgba(0,0,0,.04)'},
          title:{display:true,text:'Semanas de Tratamento',font:{family:&quot;'DM Sans'&quot;,size:11},color:'#9ca3af'},
          ticks:{font:{family:&quot;'DM Sans',sans-serif&quot;,size:11},color:'#9ca3af'}
        },
        xFrac: { type: 'linear', display: false, min: 0, max: 9, grid: { display: false } },
        y: {
          grid:{color:'rgba(0,0,0,.04)'},
          title:{display:true,text:yLabel,font:{family:&quot;'DM Sans'&quot;,size:11},color:'#9ca3af'},
          ticks:{font:{family:&quot;'DM Sans',sans-serif&quot;,size:11},color:'#9ca3af',callback:v=>v.toFixed(0)+(mode==='weight'?' kg':'%')},
          afterFit(axis) { axis.width = Math.max(axis.width, 68); }
        }
      }
    }
  });
}

function switchChart(mode, btn) {
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  chartMode = mode;
  if (lastState) renderChart(lastState.predictions, mode, lastState.currentPoint);
}

async function exportPDF() {
  const btn = document.getElementById('btnPdf');
  btn.textContent = '⏳ Gerando...'; btn.disabled = true;
  await new Promise(r => setTimeout(r, 100));
  try {
    const { jsPDF } = window.jspdf;
    const dateStr = new Date().toLocaleDateString('pt-BR');
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const MARGIN = 14, A4W = 297, A4H = 210;
    const CW = A4W - MARGIN * 2;

    pdf.setFillColor(158, 12, 36);
    pdf.roundedRect(MARGIN, MARGIN, CW, 16, 2, 2, 'F');
    pdf.setTextColor(255,255,255);
    pdf.setFont('helvetica','bold'); pdf.setFontSize(13);
    pdf.text('Predição de Perda de Peso — Tirzepatida', MARGIN+5, MARGIN+7);
    pdf.setFont('helvetica','normal'); pdf.setFontSize(7);
    pdf.text(`SURMOUNT-1/2 · Gerado em ${dateStr} · Uso exclusivo para profissionais de saúde`, MARGIN+5, MARGIN+13);

    pdf.setFont('helvetica','normal'); pdf.setFontSize(6); pdf.setTextColor(150);
    pdf.text('Uso exclusivo para profissionais de saúde · SURMOUNT-1 / SURMOUNT-2', A4W/2, A4H-5, { align:'center' });
    pdf.save(`predicao-tirzepatida-${dateStr.replace(/\//g,'-')}.pdf`);
  } catch(e) { alert('Erro ao gerar PDF.'); }
  btn.textContent = '⬇️ Exportar PDF'; btn.disabled = false;
}

<script>
document.getElementById('confirm').addEventListener('change', function() {
  document.getElementById('btn-access').disabled = !this.checked;
});

function handleAccess() {
  var crm   = document.getElementById('crm').value.trim();
  var espec = document.getElementById('espec').value;
  var valid = true;

  var crmEl = document.getElementById('crm');
  var crmErr = document.getElementById('crm-err');
  if (!crm) { crmEl.classList.add('error'); crmErr.style.display='block'; valid=false; }
  else       { crmEl.classList.remove('error'); crmErr.style.display='none'; }

  var espEl = document.getElementById('espec');
  var espErr = document.getElementById('espec-err');
  if (!espec) { espEl.classList.add('error'); espErr.style.display='block'; valid=false; }
  else         { espEl.classList.remove('error'); espErr.style.display='none'; }

  if (!valid) return;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('tool-frame').style.display = 'block';
}
</script>
